<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>📝Dashboard de Tareas📝</title>
</head>
<body>

    <header class="header">
        <h1>🔥Dashboard de Tareas🔥</h1>
        <img src="C:\Users\Carlos Dominguez\Downloads\tarea\Dominguezyanes_2doCuatrimestre\Programacion por computadora\Actividad\araña.gif" 
             alt="araña" width="100" height="100">
    </header>

    <img src="c:\Users\Carlos Dominguez\Downloads\tarea\Dominguezyanes_2doCuatrimestre\Programacion por computadora\Actividad\ghost.gif" class="arriba-izq">
    <img src="c:\Users\Carlos Dominguez\Downloads\tarea\Dominguezyanes_2doCuatrimestre\Programacion por computadora\Actividad\dragon.gif" class="arriba-der">
    <img src="c:\Users\Carlos Dominguez\Downloads\tarea\Dominguezyanes_2doCuatrimestre\Programacion por computadora\Actividad\magma.gif" class="abajo-izq">
    <img src="c:\Users\Carlos Dominguez\Downloads\tarea\Dominguezyanes_2doCuatrimestre\Programacion por computadora\Actividad\blaze.gif" class="abajo-der">

    <main class="container">
        <button id="darkModeBtn">🌙 Modo Oscuro</button>
        <input type="text" id="taskInput" placeholder="Escribe una tarea">
        <button id="addTaskBtn">➕ Agregar</button>
        <button id="completeAll">✔️ Marcar todas completadas</button>
        <button onclick="deleteAllTasks()">🗑️ Borrar todas las tareas</button>

        <!-- Mensajes de validación -->
        <p id="message" style="color:red; font-weight:bold;"></p>


        <ul id="taskList"></ul>
        <ul id="pendingList"></ul>
        <ul id="completedList"></ul>

        <!-- El Contador de tareas -->
        <section class="task-stats">
            <p>Total: <span id="totalTasks">0</span></p>
            <p>Completadas: <span id="completedTasks">0</span></p>
            <p>Pendientes: <span id="pendingTasks">0</span></p>
            <p>Progreso: <span id="progress">0%</span></p>
        </section>

        <section class="task-sort">
            <button id="sortAZ">Ordenar de A -> Z</button>
            <button id="sortZA">Ordenar de Z -> A</button>
        </section>
    </main>

    <div class="barra">
  <div id="progreso"></div>
</div>
    <!-- Conexión con el archivo JavaScript -->
    <script src="script.js"></script>
</body>
</html>
